server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: invoice-api
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  rabbitmq:
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

app:
  instance-id: ${INSTANCE_ID:local}
  consumer:
    max-retries: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      service: ${spring.application.name}
      instance: ${INSTANCE_ID:local}
