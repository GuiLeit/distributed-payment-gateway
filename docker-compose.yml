networks:
  app-net:
    driver: bridge

volumes:
  payment-db-data:
  invoice-db-data:

services:

  # ─── Databases ────────────────────────────────────────────────────────────

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  invoice-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: invoice_db
      POSTGRES_USER: ${INVOICE_DB_USER}
      POSTGRES_PASSWORD: ${INVOICE_DB_PASSWORD}
    volumes:
      - invoice-db-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${INVOICE_DB_USER} -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Message broker ───────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "15672:15672"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── payment-api ──────────────────────────────────────────────────────────

  payment-api-1:
    build:
      context: ./payment-api
    environment:
      SERVER_PORT: 8080
      INSTANCE_ID: payment-api-1
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - app-net
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  payment-api-2:
    build:
      context: ./payment-api
    environment:
      SERVER_PORT: 8080
      INSTANCE_ID: payment-api-2
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - app-net
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── invoice-api ──────────────────────────────────────────────────────────

  invoice-api-1:
    build:
      context: ./invoice-api
    environment:
      SERVER_PORT: 8080
      INSTANCE_ID: invoice-api-1
      SPRING_DATASOURCE_URL: jdbc:postgresql://invoice-db:5432/invoice_db
      SPRING_DATASOURCE_USERNAME: ${INVOICE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${INVOICE_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - app-net
    depends_on:
      invoice-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  invoice-api-2:
    build:
      context: ./invoice-api
    environment:
      SERVER_PORT: 8080
      INSTANCE_ID: invoice-api-2
      SPRING_DATASOURCE_URL: jdbc:postgresql://invoice-db:5432/invoice_db
      SPRING_DATASOURCE_USERNAME: ${INVOICE_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${INVOICE_DB_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    networks:
      - app-net
    depends_on:
      invoice-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── Nginx ────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-net
    depends_on:
      payment-api-1:
        condition: service_healthy
      payment-api-2:
        condition: service_healthy
      invoice-api-1:
        condition: service_healthy
      invoice-api-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
